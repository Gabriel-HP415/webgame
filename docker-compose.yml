services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: bto-server
    restart: unless-stopped
    environment:
      PORT: "3001"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080,http://127.0.0.1:8080}"
    # Chỉ mạng nội bộ Docker — trình duyệt dùng duy nhất :8080 (nginx)
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: bto-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
