server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 256;

    # Docker healthcheck
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"ok":true,"service":"bto-client"}';
    }

    # Socket.io → game server (Phase 2)
    location /socket.io/ {
        proxy_pass http://server:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # REST API (health, future routes)
    location /api/ {
        proxy_pass http://server:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # UI mockups (trangchu, timdoithu, chiendau)
    location /ui/ {
        alias /usr/share/nginx/html/ui/;
        try_files $uri $uri/ =404;
    }

    # Static files + fallback về trang chủ (index.html) nếu không có file
    location / {
        try_files $uri $uri/ /index.html;
    }
}
